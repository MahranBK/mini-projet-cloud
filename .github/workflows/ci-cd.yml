name: CI/CD Pipeline
on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # VÉRIFIE BIEN CES NOMS DANS TES SETTINGS GITHUB
          username: ${{ secrets.DOCKER_HUB_USERNAME }} 
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Flask App
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/flask-tasks:latest ./flask-app
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/flask-tasks:latest